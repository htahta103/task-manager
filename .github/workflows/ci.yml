name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
      - name: Format check
        run: |
          test -z "$(gofmt -l .)"
      - name: Typecheck (go vet)
        run: go vet ./...
      - name: Test
        run: go test ./...
